<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Base Mini App metadata (required) -->
  <meta name="talentapp:project_verification" content="717a427fcc02af8d33bc8d28e782b6bd6925ca3284c54b1ad76f72305ab1e6368d57ca2b1c640a023ab9b3776fd60a8d860f9bfac11e3de73ade462e1a88ab63">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tic Tac Toe · Base Mini App</title>
  <meta name="base:app_id" content="6994b20be0d5d2cf831b5f35">
  <script src="https://unpkg.com/@base-org/miniapp-sdk/dist/index.umd.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* minimal reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* light theme (default) */
    body {
      --bg: #f0f2f8;
      --card: rgba(255, 255, 255, 0.9);
      --text: #1e2a3a;
      --textSoft: #4b5563;
      --xCol: #e53e3e;
      --yCol: #2c7a4d;   /* Y is greenish, distinct from X */
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      --cellBg: #ffffff;
      --cellHover: #f9f9ff;
      --modalBg: rgba(0, 0, 0, 0.6);
      --modalCard: white;
    }

    body.dark {
      --bg: #0a0f1c;
      --card: #1a253cdd;
      --text: #e2e8f0;
      --textSoft: #94a3b8;
      --xCol: #f87171;
      --yCol: #4ade80;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      --cellBg: #1e2a3a;
      --cellHover: #2d3e55;
      --modalBg: rgba(0, 0, 0, 0.8);
      --modalCard: #1e293b;
    }

    body {
      background: var(--bg);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      transition: background 0.2s;
    }

    .gameContainer {
      max-width: 500px;
      width: 100%;
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 1.6rem;
      box-shadow: var(--shadow);
    }

    /* header */
    .topBar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--xCol), var(--yCol));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    #darkBtn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--textSoft);
      padding: 0.3rem;
      border-radius: 50%;
    }

    /* mode switcher */
    .modeGroup {
      display: flex;
      gap: 0.8rem;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 3rem;
      padding: 0.25rem;
      margin-bottom: 1rem;
    }

    .modeItem {
      flex: 1;
      text-align: center;
      padding: 0.5rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--textSoft);
    }

    .modeItem.active {
      background: var(--yCol);
      color: white;
      box-shadow: 0 2px 8px rgba(74, 222, 128, 0.3);
    }

    .diffBox {
      margin: 0.5rem 0 1rem;
      display: none;
      justify-content: center;
    }

    .diffBox.visible {
      display: flex;
    }

    select {
      background: var(--cellBg);
      color: var(--text);
      border: 1px solid var(--textSoft);
      border-radius: 2rem;
      padding: 0.4rem 1rem;
    }

    /* scoreboard */
    .scoreRow {
      display: flex;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      margin-bottom: 1.5rem;
    }

    .scoreCard {
      text-align: center;
    }

    .scoreCard span:first-child {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--textSoft);
    }

    .scoreVal {
      font-size: 1.8rem;
      font-weight: bold;
      line-height: 1;
    }

    .xScore { color: var(--xCol); }
    .yScore { color: var(--yCol); }

    .status {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      color: var(--text);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }

    .cell {
      aspect-ratio: 1;
      background: var(--cellBg);
      border-radius: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: 0.05s linear;
      color: var(--text);
    }

    .cell.x { color: var(--xCol); }
    .cell.y { color: var(--yCol); }
    .cell.win {
      background: #4ade8033;
      border: 2px solid #4ade80;
    }

    .cell:active {
      transform: scale(0.96);
    }

    .actionButtons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    button {
      background: var(--cellBg);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      color: var(--text);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    #newGameBtn {
      background: var(--yCol);
      color: white;
    }

    /* modal popup */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--modalBg);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
      z-index: 1000;
    }

    .modal.show {
      visibility: visible;
      opacity: 1;
    }

    .modalCard {
      background: var(--modalCard);
      border-radius: 2rem;
      padding: 1.5rem;
      text-align: center;
      width: 280px;
    }

    .modalIcon {
      font-size: 3rem;
    }

    .modalMsg {
      font-size: 1.6rem;
      font-weight: bold;
      margin: 0.5rem 0;
    }

    .modalActions {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<div class="gameContainer">
  <div class="topBar">
    <h1>🎮 Tic Tac Toe</h1>
    <button id="darkBtn"><i class="fas fa-moon"></i></button>
  </div>

  <div class="modeGroup">
    <div class="modeItem active" id="friendMode">👥 2 Players</div>
    <div class="modeItem" id="computerMode">🧑‍💻 You vs Computer</div>
  </div>

  <div class="diffBox" id="diffBox">
    <select id="difficultySelect">
      <option value="easy">Easy</option>
      <option value="medium" selected>Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>

  <div class="scoreRow">
    <div class="scoreCard"><span>X wins</span><div class="scoreVal xScore" id="xScore">0</div></div>
    <div class="scoreCard"><span>Draws</span><div class="scoreVal" id="drawScore">0</div></div>
    <div class="scoreCard"><span>Y wins</span><div class="scoreVal yScore" id="yScore">0</div></div>
  </div>

  <div class="status" id="statusMsg">X's turn</div>

  <div class="board" id="board">
    <div class="cell" data-idx="0"></div>
    <div class="cell" data-idx="1"></div>
    <div class="cell" data-idx="2"></div>
    <div class="cell" data-idx="3"></div>
    <div class="cell" data-idx="4"></div>
    <div class="cell" data-idx="5"></div>
    <div class="cell" data-idx="6"></div>
    <div class="cell" data-idx="7"></div>
    <div class="cell" data-idx="8"></div>
  </div>

  <div class="actionButtons">
    <button id="newGameBtn"><i class="fas fa-redo-alt"></i> New Game</button>
    <button id="resetScoresBtn"><i class="fas fa-trash-alt"></i> Reset</button>
  </div>
</div>

<!-- winner popup -->
<div id="winnerModal" class="modal">
  <div class="modalCard">
    <div class="modalIcon" id="modalIcon">🏆</div>
    <div class="modalMsg" id="modalMsg">Winner!</div>
    <div class="modalActions">
      <button id="closeModalBtn">Close</button>
      <button id="playAgainModalBtn" style="background: var(--yCol); color:white;">Play again</button>
    </div>
  </div>
</div>

<script>
  // ---------- grab elements ----------
  const cells = document.querySelectorAll('.cell');
  const statusDiv = document.getElementById('statusMsg');
  const xScoreSpan = document.getElementById('xScore');
  const drawSpan = document.getElementById('drawScore');
  const yScoreSpan = document.getElementById('yScore');
  const newGameBtn = document.getElementById('newGameBtn');
  const resetScoresBtn = document.getElementById('resetScoresBtn');
  const friendModeBtn = document.getElementById('friendMode');
  const computerModeBtn = document.getElementById('computerMode');
  const diffBox = document.getElementById('diffBox');
  const diffSelect = document.getElementById('difficultySelect');
  const darkBtn = document.getElementById('darkBtn');
  const modal = document.getElementById('winnerModal');
  const modalIcon = document.getElementById('modalIcon');
  const modalMsg = document.getElementById('modalMsg');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const playAgainModalBtn = document.getElementById('playAgainModalBtn');

  // ---------- game state ----------
  let board = ['', '', '', '', '', '', '', '', ''];
  let currentPlayer = 'X';      // X always starts
  let gameActive = true;
  let vsComputer = false;        // friend mode default
  let difficulty = 'medium';
  let scores = { X: 0, Y: 0, draws: 0 };

  // winning combos
  const winPatterns = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
  ];

  // ---------- simple sound effects (optional) ----------
  let audioCtx = null;
  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { /* no audio, fine */ }
  }
  function playBeep(type) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    let freq = type === 'win' ? 880 : 540;
    if (type === 'draw') freq = 440;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
  }

  // ---------- UI updates ----------
  function updateScoresUI() {
    xScoreSpan.innerText = scores.X;
    drawSpan.innerText = scores.draws;
    yScoreSpan.innerText = scores.Y;
  }

  function checkWin(player) {
    return winPatterns.some(combo => combo.every(idx => board[idx] === player));
  }

  function checkDraw() {
    return board.every(cell => cell !== '');
  }

  function highlightWinning(player) {
    winPatterns.forEach(combo => {
      if (combo.every(idx => board[idx] === player)) {
        combo.forEach(idx => cells[idx].classList.add('win'));
      }
    });
  }

  function clearHighlights() {
    cells.forEach(cell => cell.classList.remove('win'));
  }

  // popup with icons: trophy for X, sparkle for Y, handshake for draw
  function showPopup(winner) {
    let msg = '', icon = '';
    if (winner === 'X') {
      msg = 'X Wins!';
      icon = '🏆';
      playBeep('win');
    } else if (winner === 'Y') {
      msg = 'Y Wins!';
      icon = '✨';
      playBeep('win');
    } else {
      msg = 'Draw!';
      icon = '🤝';
      playBeep('draw');
    }
    modalMsg.innerText = msg;
    modalIcon.innerText = icon;
    modal.classList.add('show');
  }

  function closeModal() {
    modal.classList.remove('show');
  }

  function endGame(winner) {
    gameActive = false;
    if (winner === 'X') {
      scores.X++;
      highlightWinning('X');
      showPopup('X');
    } else if (winner === 'Y') {
      scores.Y++;
      highlightWinning('Y');
      showPopup('Y');
    } else if (winner === 'draw') {
      scores.draws++;
      showPopup('draw');
    }
    updateScoresUI();
    statusDiv.innerText = winner === 'draw' ? "It's a draw!" : `${winner} wins!`;
  }

  function checkGameOver() {
    if (checkWin(currentPlayer)) {
      endGame(currentPlayer);
      return true;
    }
    if (checkDraw()) {
      endGame('draw');
      return true;
    }
    return false;
  }

  function renderBoard() {
    for (let i = 0; i < 9; i++) {
      let val = board[i];
      cells[i].innerText = val;
      cells[i].classList.remove('x', 'y');
      if (val === 'X') cells[i].classList.add('x');
      if (val === 'Y') cells[i].classList.add('y');
    }
  }

  function resetGame() {
    board.fill('');
    currentPlayer = 'X';
    gameActive = true;
    clearHighlights();
    renderBoard();
    statusDiv.innerText = "X's turn";
    closeModal();
  }

  function fullReset() {
    scores = { X: 0, Y: 0, draws: 0 };
    updateScoresUI();
    resetGame();
  }

  // ---------- player move ----------
  function playerMove(idx) {
    if (!gameActive) return false;
    if (board[idx] !== '') return false;
    // in vsComputer mode, only X can be moved by human
    if (vsComputer && currentPlayer !== 'X') return false;

    board[idx] = currentPlayer;
    cells[idx].innerText = currentPlayer;
    cells[idx].classList.add(currentPlayer === 'X' ? 'x' : 'y');

    if (checkGameOver()) return true;

    // switch player
    currentPlayer = currentPlayer === 'X' ? 'Y' : 'X';
    statusDiv.innerText = `${currentPlayer}'s turn`;

    // if vs computer and now it's Y's turn, trigger AI
    if (vsComputer && gameActive && currentPlayer === 'Y') {
      setTimeout(aiMove, 280);
    }
    return true;
  }

  // ---------- AI for Y (computer) ----------
  function getEmptyCells() {
    let empty = [];
    for (let i = 0; i < 9; i++) if (board[i] === '') empty.push(i);
    return empty;
  }

  function randomMove() {
    let empty = getEmptyCells();
    if (empty.length === 0) return null;
    return empty[Math.floor(Math.random() * empty.length)];
  }

  function mediumMove() {
    // try to win with Y
    for (let combo of winPatterns) {
      let [a,b,c] = combo;
      if (board[a] === 'Y' && board[b] === 'Y' && board[c] === '') return c;
      if (board[a] === 'Y' && board[c] === 'Y' && board[b] === '') return b;
      if (board[b] === 'Y' && board[c] === 'Y' && board[a] === '') return a;
    }
    // block X
    for (let combo of winPatterns) {
      let [a,b,c] = combo;
      if (board[a] === 'X' && board[b] === 'X' && board[c] === '') return c;
      if (board[a] === 'X' && board[c] === 'X' && board[b] === '') return b;
      if (board[b] === 'X' && board[c] === 'X' && board[a] === '') return a;
    }
    return null;
  }

  function minimax(boardArr, depth, isMax) {
    let yWins = winPatterns.some(combo => combo.every(i => boardArr[i] === 'Y'));
    let xWins = winPatterns.some(combo => combo.every(i => boardArr[i] === 'X'));
    if (yWins) return 10 - depth;
    if (xWins) return depth - 10;
    if (boardArr.every(c => c !== '')) return 0;
    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (boardArr[i] === '') {
          boardArr[i] = 'Y';
          let score = minimax(boardArr, depth+1, false);
          boardArr[i] = '';
          best = Math.max(best, score);
        }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (boardArr[i] === '') {
          boardArr[i] = 'X';
          let score = minimax(boardArr, depth+1, true);
          boardArr[i] = '';
          best = Math.min(best, score);
        }
      }
      return best;
    }
  }

  function bestHardMove() {
    let bestScore = -Infinity;
    let bestIdx = null;
    for (let i = 0; i < 9; i++) {
      if (board[i] === '') {
        board[i] = 'Y';
        let score = minimax(board, 0, false);
        board[i] = '';
        if (score > bestScore) {
          bestScore = score;
          bestIdx = i;
        }
      }
    }
    return bestIdx;
  }

  function aiMove() {
    if (!gameActive) return;
    if (currentPlayer !== 'Y') return;
    let move = null;
    if (difficulty === 'easy') {
      move = randomMove();
    } else if (difficulty === 'medium') {
      move = mediumMove();
      if (move === null) move = randomMove();
    } else {
      move = bestHardMove();
    }
    if (move !== null && move !== undefined) {
      board[move] = 'Y';
      cells[move].innerText = 'Y';
      cells[move].classList.add('y');
      if (checkGameOver()) return;
      currentPlayer = 'X';
      statusDiv.innerText = "X's turn";
    }
  }

  // ---------- event binding ----------
  cells.forEach(cell => {
    cell.addEventListener('click', (e) => {
      let idx = parseInt(cell.getAttribute('data-idx'));
      if (!audioCtx) {
        initAudio();
        if (audioCtx) audioCtx.resume();
      }
      playerMove(idx);
    });
  });

  newGameBtn.addEventListener('click', resetGame);
  resetScoresBtn.addEventListener('click', fullReset);

  friendModeBtn.addEventListener('click', () => {
    vsComputer = false;
    friendModeBtn.classList.add('active');
    computerModeBtn.classList.remove('active');
    diffBox.classList.remove('visible');
    resetGame();
  });

  computerModeBtn.addEventListener('click', () => {
    vsComputer = true;
    computerModeBtn.classList.add('active');
    friendModeBtn.classList.remove('active');
    diffBox.classList.add('visible');
    resetGame();
  });

  diffSelect.addEventListener('change', (e) => {
    difficulty = e.target.value;
  });

  // dark mode (localStorage)
  let darkMode = localStorage.getItem('darkMode') === 'true';
  function setDarkMode(enabled) {
    if (enabled) document.body.classList.add('dark');
    else document.body.classList.remove('dark');
    localStorage.setItem('darkMode', enabled);
    let icon = darkBtn.querySelector('i');
    if (enabled) icon.className = 'fas fa-sun';
    else icon.className = 'fas fa-moon';
  }
  darkBtn.addEventListener('click', () => {
    darkMode = !darkMode;
    setDarkMode(darkMode);
  });
  setDarkMode(darkMode);

  // modal close / replay
  closeModalBtn.addEventListener('click', closeModal);
  playAgainModalBtn.addEventListener('click', () => {
    closeModal();
    resetGame();
  });

  // initialise
  updateScoresUI();
  resetGame();

  // Base SDK ready
  const miniApp = new MiniAppSDK.MiniApp();
  miniApp.ready();
</script>
</body>
</html>
