<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Base Mini App stuff (needed for verification) -->
  <meta name="talentapp:project_verification" content="717a427fcc02af8d33bc8d28e782b6bd6925ca3284c54b1ad76f72305ab1e6368d57ca2b1c640a023ab9b3776fd60a8d860f9bfac11e3de73ade462e1a88ab63">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tic Tac Toe · Base</title>
  <meta name="base:app_id" content="6994b645e0d5d2cf831b5f39">
  <script src="https://unpkg.com/@base-org/miniapp-sdk/dist/index.umd.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* i like clean but not too fancy */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* light theme */
    body {
      --bg: #eef2f5;
      --card: rgba(255,255,255,0.9);
      --text: #1f2a44;
      --textSoft: #4a5568;
      --xCol: #e53e3e;
      --oCol: #3182ce;
      --shadow: 0 8px 20px rgba(0,0,0,0.1);
      --cellBg: white;
      --cellHover: #f7fafc;
      --modalBg: rgba(0,0,0,0.6);
      --modalCard: white;
    }

    body.dark {
      --bg: #0b1120;
      --card: #1a253cdd;
      --text: #e2e8f0;
      --textSoft: #94a3b8;
      --xCol: #f87171;
      --oCol: #60a5fa;
      --shadow: 0 8px 20px rgba(0,0,0,0.3);
      --cellBg: #1e2a3a;
      --cellHover: #2d3e55;
      --modalBg: rgba(0,0,0,0.8);
      --modalCard: #1e293b;
    }

    body {
      background: var(--bg);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      transition: background 0.2s;
    }

    .gameWrap {
      max-width: 500px;
      width: 100%;
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 1.6rem;
      box-shadow: var(--shadow);
    }

    /* header with dark mode button */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.7rem;
      background: linear-gradient(135deg, var(--xCol), var(--oCol));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    #darkToggle {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--textSoft);
      padding: 0.3rem;
      border-radius: 50%;
    }

    /* mode switcher */
    .modeSelect {
      display: flex;
      gap: 0.7rem;
      background: rgba(0,0,0,0.05);
      border-radius: 3rem;
      padding: 0.2rem;
      margin-bottom: 1rem;
    }

    .modeBtn {
      flex: 1;
      text-align: center;
      padding: 0.5rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--textSoft);
    }

    .modeBtn.active {
      background: var(--oCol);
      color: white;
      box-shadow: 0 2px 8px rgba(59,130,246,0.3);
    }

    .diffControl {
      margin: 0.5rem 0 1rem;
      display: none;
      justify-content: center;
    }

    .diffControl.visible {
      display: flex;
    }

    select {
      background: var(--cellBg);
      color: var(--text);
      border: 1px solid var(--textSoft);
      border-radius: 2rem;
      padding: 0.4rem 1rem;
    }

    /* scores */
    .scoreRow {
      display: flex;
      justify-content: space-between;
      background: rgba(0,0,0,0.05);
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      margin-bottom: 1.5rem;
    }

    .scoreBlock {
      text-align: center;
    }

    .scoreBlock span:first-child {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--textSoft);
    }

    .scoreNum {
      font-size: 1.8rem;
      font-weight: bold;
      line-height: 1;
    }

    .xScore { color: var(--xCol); }
    .oScore { color: var(--oCol); }

    .status {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      color: var(--text);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.7rem;
      margin-bottom: 1.8rem;
    }

    .cell {
      aspect-ratio: 1;
      background: var(--cellBg);
      border-radius: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: 0.05s linear;
      color: var(--text);
    }

    .cell.x { color: var(--xCol); }
    .cell.o { color: var(--oCol); }
    .cell.win {
      background: #4ade8033;
      border: 2px solid #4ade80;
    }

    .cell:active {
      transform: scale(0.96);
    }

    .actionBtns {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    button {
      background: var(--cellBg);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      color: var(--text);
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    #newGame {
      background: var(--oCol);
      color: white;
    }

    /* modal */
    .popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--modalBg);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
      z-index: 1000;
    }

    .popup.show {
      visibility: visible;
      opacity: 1;
    }

    .popupCard {
      background: var(--modalCard);
      border-radius: 2rem;
      padding: 1.5rem;
      text-align: center;
      width: 280px;
    }

    .popupIcon {
      font-size: 3rem;
    }

    .popupMsg {
      font-size: 1.6rem;
      font-weight: bold;
      margin: 0.5rem 0;
    }

    .popupButtons {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<div class="gameWrap">
  <div class="header">
    <h1>✖️ Tic Tac Toe</h1>
    <button id="darkToggle"><i class="fas fa-moon"></i></button>
  </div>

  <div class="modeSelect">
    <div class="modeBtn active" id="friendBtn">👥 2 Players</div>
    <div class="modeBtn" id="cpuBtn">🤖 vs CPU</div>
  </div>

  <div class="diffControl" id="diffPanel">
    <select id="diffSelect">
      <option value="easy">Easy</option>
      <option value="medium" selected>Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>

  <div class="scoreRow">
    <div class="scoreBlock"><span>X wins</span><div class="scoreNum xScore" id="xScore">0</div></div>
    <div class="scoreBlock"><span>Draws</span><div class="scoreNum" id="drawScore">0</div></div>
    <div class="scoreBlock"><span>O wins</span><div class="scoreNum oScore" id="oScore">0</div></div>
  </div>

  <div class="status" id="statusMsg">X's turn</div>

  <div class="board" id="board">
    <div class="cell" data-idx="0"></div>
    <div class="cell" data-idx="1"></div>
    <div class="cell" data-idx="2"></div>
    <div class="cell" data-idx="3"></div>
    <div class="cell" data-idx="4"></div>
    <div class="cell" data-idx="5"></div>
    <div class="cell" data-idx="6"></div>
    <div class="cell" data-idx="7"></div>
    <div class="cell" data-idx="8"></div>
  </div>

  <div class="actionBtns">
    <button id="newGame"><i class="fas fa-redo-alt"></i> New Game</button>
    <button id="resetScores"><i class="fas fa-trash-alt"></i> Reset</button>
  </div>
</div>

<!-- popup -->
<div id="winnerPopup" class="popup">
  <div class="popupCard">
    <div class="popupIcon" id="popupIcon">🎉</div>
    <div class="popupMsg" id="popupMsg">Winner!</div>
    <div class="popupButtons">
      <button id="closePopup">Close</button>
      <button id="playAgainPopup" style="background: var(--oCol); color:white;">Play again</button>
    </div>
  </div>
</div>

<script>
  // ----- grab all elements -----
  const cells = document.querySelectorAll('.cell');
  const statusDiv = document.getElementById('statusMsg');
  const xScoreSpan = document.getElementById('xScore');
  const drawSpan = document.getElementById('drawScore');
  const oScoreSpan = document.getElementById('oScore');
  const newGameBtn = document.getElementById('newGame');
  const resetScoresBtn = document.getElementById('resetScores');
  const friendBtn = document.getElementById('friendBtn');
  const cpuBtn = document.getElementById('cpuBtn');
  const diffPanel = document.getElementById('diffPanel');
  const diffSelect = document.getElementById('diffSelect');
  const darkToggle = document.getElementById('darkToggle');
  const popup = document.getElementById('winnerPopup');
  const popupIconSpan = document.getElementById('popupIcon');
  const popupMsgSpan = document.getElementById('popupMsg');
  const closePopupBtn = document.getElementById('closePopup');
  const playAgainPopupBtn = document.getElementById('playAgainPopup');

  // ---- game state (a bit messy but works) ----
  let boardState = ['', '', '', '', '', '', '', '', ''];
  let turn = 'X';           // X always starts
  let gameLive = true;
  let vsComputer = false;   // friend mode default
  let difficulty = 'medium';
  let scores = { X: 0, O: 0, draws: 0 };

  // winning combos (old school)
  const winPatterns = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
  ];

  // ---- simple audio (beep on win/draw) ----
  let audioCtx = null;
  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { /* no biggie */ }
  }
  function playBeep(type) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    let freq = type === 'win' ? 880 : 520;
    if (type === 'draw') freq = 440;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
  }

  // update score numbers on screen
  function refreshScores() {
    xScoreSpan.innerText = scores.X;
    drawSpan.innerText = scores.draws;
    oScoreSpan.innerText = scores.O;
  }

  // check if player won
  function checkWin(player) {
    return winPatterns.some(combo => combo.every(idx => boardState[idx] === player));
  }

  function checkDraw() {
    return boardState.every(cell => cell !== '');
  }

  // highlight winning cells (just for fun)
  function highlightWinning(player) {
    winPatterns.forEach(combo => {
      if (combo.every(idx => boardState[idx] === player)) {
        combo.forEach(idx => cells[idx].classList.add('win'));
      }
    });
  }

  function clearHighlights() {
    cells.forEach(cell => cell.classList.remove('win'));
  }

  // show popup with clean icons: 🏆 for X, ✨ for O, 🤝 for draw
  function showResultPopup(winner) {
    let msg = '', icon = '';
    if (winner === 'X') {
      msg = 'X Wins!';
      icon = '🏆';
      playBeep('win');
    } else if (winner === 'O') {
      msg = 'O Wins!';
      icon = '✨';
      playBeep('win');
    } else {
      msg = 'Draw!';
      icon = '🤝';
      playBeep('draw');
    }
    popupMsgSpan.innerText = msg;
    popupIconSpan.innerText = icon;
    popup.classList.add('show');
  }

  function closePopup() {
    popup.classList.remove('show');
  }

  // end game: update scores, show popup, highlight
  function endGame(winner) {
    gameLive = false;
    if (winner === 'X') {
      scores.X++;
      highlightWinning('X');
      showResultPopup('X');
    } else if (winner === 'O') {
      scores.O++;
      highlightWinning('O');
      showResultPopup('O');
    } else if (winner === 'draw') {
      scores.draws++;
      showResultPopup('draw');
    }
    refreshScores();
    statusDiv.innerText = winner === 'draw' ? "It's a draw!" : `${winner} wins!`;
  }

  // after a move, check win/draw
  function checkGameOver() {
    if (checkWin(turn)) {
      endGame(turn);
      return true;
    }
    if (checkDraw()) {
      endGame('draw');
      return true;
    }
    return false;
  }

  // render board from state
  function renderBoard() {
    for (let i = 0; i < 9; i++) {
      let val = boardState[i];
      cells[i].innerText = val;
      cells[i].classList.remove('x', 'o');
      if (val === 'X') cells[i].classList.add('x');
      if (val === 'O') cells[i].classList.add('o');
    }
  }

  // reset board without touching scores
  function resetBoard() {
    boardState.fill('');
    turn = 'X';
    gameLive = true;
    clearHighlights();
    renderBoard();
    statusDiv.innerText = "X's turn";
    closePopup();
  }

  // full reset including scores
  function fullReset() {
    scores = { X: 0, O: 0, draws: 0 };
    refreshScores();
    resetBoard();
  }

  // human move (X always human, O is either human or AI)
  function humanMove(idx) {
    if (!gameLive) return false;
    if (boardState[idx] !== '') return false;
    if (vsComputer && turn !== 'X') return false;  // in CPU mode only X can click

    boardState[idx] = turn;
    cells[idx].innerText = turn;
    cells[idx].classList.add(turn === 'X' ? 'x' : 'o');

    if (checkGameOver()) return true;

    // switch turn
    turn = turn === 'X' ? 'O' : 'X';
    statusDiv.innerText = `${turn}'s turn`;

    // if vs CPU and now it's O's turn, call AI
    if (vsComputer && gameLive && turn === 'O') {
      setTimeout(aiMove, 280);
    }
    return true;
  }

  // ----- AI functions (simple but works) -----
  function getEmptySpots() {
    let empty = [];
    for (let i = 0; i < 9; i++) if (boardState[i] === '') empty.push(i);
    return empty;
  }

  function randomMove() {
    let empty = getEmptySpots();
    if (empty.length === 0) return null;
    return empty[Math.floor(Math.random() * empty.length)];
  }

  // medium: try to win or block
  function mediumAI() {
    // try to win
    for (let combo of winPatterns) {
      let [a,b,c] = combo;
      if (boardState[a] === 'O' && boardState[b] === 'O' && boardState[c] === '') return c;
      if (boardState[a] === 'O' && boardState[c] === 'O' && boardState[b] === '') return b;
      if (boardState[b] === 'O' && boardState[c] === 'O' && boardState[a] === '') return a;
    }
    // block X
    for (let combo of winPatterns) {
      let [a,b,c] = combo;
      if (boardState[a] === 'X' && boardState[b] === 'X' && boardState[c] === '') return c;
      if (boardState[a] === 'X' && boardState[c] === 'X' && boardState[b] === '') return b;
      if (boardState[b] === 'X' && boardState[c] === 'X' && boardState[a] === '') return a;
    }
    return null;
  }

  // minimax for hard mode (simple but effective)
  function minimax(boardArr, depth, isMax) {
    let isOWin = winPatterns.some(combo => combo.every(i => boardArr[i] === 'O'));
    let isXWin = winPatterns.some(combo => combo.every(i => boardArr[i] === 'X'));
    if (isOWin) return 10 - depth;
    if (isXWin) return depth - 10;
    if (boardArr.every(c => c !== '')) return 0;
    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (boardArr[i] === '') {
          boardArr[i] = 'O';
          let score = minimax(boardArr, depth+1, false);
          boardArr[i] = '';
          best = Math.max(best, score);
        }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (boardArr[i] === '') {
          boardArr[i] = 'X';
          let score = minimax(boardArr, depth+1, true);
          boardArr[i] = '';
          best = Math.min(best, score);
        }
      }
      return best;
    }
  }

  function bestMoveHard() {
    let bestScore = -Infinity;
    let bestIdx = null;
    for (let i = 0; i < 9; i++) {
      if (boardState[i] === '') {
        boardState[i] = 'O';
        let score = minimax(boardState, 0, false);
        boardState[i] = '';
        if (score > bestScore) {
          bestScore = score;
          bestIdx = i;
        }
      }
    }
    return bestIdx;
  }

  function aiMove() {
    if (!gameLive) return;
    if (turn !== 'O') return;
    let move = null;
    if (difficulty === 'easy') {
      move = randomMove();
    } else if (difficulty === 'medium') {
      move = mediumAI();
      if (move === null) move = randomMove();
    } else {
      move = bestMoveHard();
    }
    if (move !== null && move !== undefined) {
      boardState[move] = 'O';
      cells[move].innerText = 'O';
      cells[move].classList.add('o');
      if (checkGameOver()) return;
      turn = 'X';
      statusDiv.innerText = "X's turn";
    }
  }

  // ---- event listeners ----
  cells.forEach(cell => {
    cell.addEventListener('click', (e) => {
      let idx = parseInt(cell.getAttribute('data-idx'));
      // init audio on first click (user gesture)
      if (!audioCtx) {
        initAudio();
        if (audioCtx) audioCtx.resume();
      }
      humanMove(idx);
    });
  });

  newGameBtn.addEventListener('click', resetBoard);
  resetScoresBtn.addEventListener('click', fullReset);

  friendBtn.addEventListener('click', () => {
    vsComputer = false;
    friendBtn.classList.add('active');
    cpuBtn.classList.remove('active');
    diffPanel.classList.remove('visible');
    resetBoard();
  });

  cpuBtn.addEventListener('click', () => {
    vsComputer = true;
    cpuBtn.classList.add('active');
    friendBtn.classList.remove('active');
    diffPanel.classList.add('visible');
    resetBoard();
  });

  diffSelect.addEventListener('change', (e) => {
    difficulty = e.target.value;
  });

  // dark mode (store in localStorage)
  let darkEnabled = localStorage.getItem('darkMode') === 'true';
  function applyDark(enabled) {
    if (enabled) document.body.classList.add('dark');
    else document.body.classList.remove('dark');
    localStorage.setItem('darkMode', enabled);
    let icon = darkToggle.querySelector('i');
    if (enabled) icon.className = 'fas fa-sun';
    else icon.className = 'fas fa-moon';
  }
  darkToggle.addEventListener('click', () => {
    darkEnabled = !darkEnabled;
    applyDark(darkEnabled);
  });
  applyDark(darkEnabled);

  // popup buttons
  closePopupBtn.addEventListener('click', closePopup);
  playAgainPopupBtn.addEventListener('click', () => {
    closePopup();
    resetBoard();
  });

  // init
  refreshScores();
  resetBoard();

  // Base Mini App SDK init (required)
  const miniApp = new MiniAppSDK.MiniApp();
  miniApp.ready();
</script>
</body>
</html>
